services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flight_data_scrapper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    # Load secrets and optional keys from the .env file
    env_file: ./backend/.env
    # Override Docker-specific vars so the .env host/db-name never matters
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${DB_PASSWORD:-postgres}@db:5432/flight_data_scrapper
      CORS_ORIGINS: '["http://localhost","http://localhost:5173"]'
    ports: ["8000:8000"]
    depends_on:
      db: { condition: service_healthy }

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["80:80"]
    depends_on: [backend]

volumes:
  postgres_data:
