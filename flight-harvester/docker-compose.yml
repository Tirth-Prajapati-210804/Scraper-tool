services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flight_data_scrapper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    # NOTE: Port 5432 is intentionally NOT exposed to the host.
    # The database is only reachable within the Docker network (by the backend service).
    # To connect locally for debugging: docker exec -it <container> psql -U postgres
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    # Load secrets and optional keys from the .env file
    env_file: ./backend/.env
    # Override Docker-specific vars so the .env host/db-name never matters
    environment:
      DATABASE_URL: postgresql://neondb_owner:npg_ap4mRPn5vYlV@ep-sweet-mode-a1q9gg67-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      # Set CORS_ORIGINS to your production domain, e.g: https://flights.yourdomain.com
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    # NOTE: Port 8000 is NOT exposed to the host in production.
    # All traffic goes through nginx (frontend) which proxies /api/ to backend.
    depends_on:
      db: { condition: service_healthy }

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["80:80"]
    depends_on: [backend]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

# postgres_data volume persists the database across container restarts.
# To back up: docker exec <db-container> pg_dump -U postgres flight_data_scrapper > backup.sql
volumes:
  postgres_data:
