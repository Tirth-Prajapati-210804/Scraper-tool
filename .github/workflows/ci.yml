name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flight-harvester/backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install .[dev]

      - name: Run migrations
        run: python -m alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/flight_test
          JWT_SECRET_KEY: ci-secret-key-that-is-at-least-32-characters-long
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: CIAdminPassword1!

      - name: Run unit tests
        run: pytest tests/ -v --ignore=tests/integration
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/flight_test
          JWT_SECRET_KEY: ci-secret-key-that-is-at-least-32-characters-long
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: CIAdminPassword1!

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost/flight_test
          JWT_SECRET_KEY: ci-secret-key-that-is-at-least-32-characters-long
          ADMIN_EMAIL: admin@example.com
          ADMIN_PASSWORD: CIAdminPassword1!

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flight-harvester/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: flight-harvester/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:run

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flight-harvester/frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: flight-harvester/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: flight-harvester/frontend/playwright-report/
          retention-days: 7
